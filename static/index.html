<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuoteBot - 智能名言探索代理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  height: 100vh;
  overflow: hidden;
}

.container {
  display: flex;
  height: 100vh;
}

/* 左侧聊天面板 */
.chat-panel {
  width: 420px;
  min-width: 320px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #2a2a3e;
  background: #13131f;
}

.chat-header {
  padding: 16px 20px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border-bottom: 1px solid #2a2a3e;
  display: flex;
  align-items: center;
  gap: 12px;
}

.chat-header .logo {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.chat-header h1 {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
}

.chat-header .subtitle {
  font-size: 11px;
  color: #888;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.message {
  max-width: 95%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.message.assistant {
  align-self: flex-start;
  background: #1e1e30;
  border: 1px solid #2a2a3e;
  border-bottom-left-radius: 4px;
}

.message.thinking {
  align-self: flex-start;
  background: #1a1a28;
  border: 1px solid #333;
  color: #aaa;
  font-style: italic;
  border-bottom-left-radius: 4px;
}

.message.thought {
  align-self: flex-start;
  background: #1a1e2e;
  border: 1px solid #2a3a5e;
  color: #b0c4de;
  border-bottom-left-radius: 4px;
}

.message.info {
  align-self: flex-start;
  background: #1a2a1e;
  border: 1px solid #2a4a3e;
  color: #90d4a0;
  border-bottom-left-radius: 4px;
}

.message.warning {
  align-self: flex-start;
  background: #2a2a1a;
  border: 1px solid #4a4a2e;
  color: #e0c060;
  border-bottom-left-radius: 4px;
}

.message.success {
  align-self: flex-start;
  background: #1a2e1e;
  border: 1px solid #3a6a3e;
  color: #80e090;
  font-weight: 500;
  border-bottom-left-radius: 4px;
}

.message.result {
  align-self: flex-start;
  background: linear-gradient(135deg, #1a1e2e, #1e2a3e);
  border: 1px solid #4a5a8e;
  color: #c0d0e0;
  border-bottom-left-radius: 4px;
}

/* 输入区域 */
.chat-input-area {
  padding: 16px;
  border-top: 1px solid #2a2a3e;
  background: #13131f;
}

.input-wrapper {
  display: flex;
  gap: 8px;
}

.chat-input {
  flex: 1;
  padding: 12px 16px;
  background: #1e1e30;
  border: 1px solid #2a2a3e;
  border-radius: 12px;
  color: #e0e0e0;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.chat-input:focus {
  border-color: #667eea;
}

.chat-input::placeholder {
  color: #555;
}

.btn-send, .btn-stop {
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-send {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
}

.btn-send:hover { opacity: 0.9; transform: scale(1.02); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-stop {
  background: #4a2020;
  color: #e06060;
  border: 1px solid #6a3030;
}

.btn-stop:hover { background: #5a2525; }

/* 快捷按钮 */
.quick-commands {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.quick-btn {
  padding: 6px 12px;
  background: #1e1e30;
  border: 1px solid #2a2a3e;
  border-radius: 20px;
  color: #888;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}

.quick-btn:hover {
  border-color: #667eea;
  color: #667eea;
}

/* 右侧浏览器面板 */
.browser-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #0a0a14;
}

.browser-toolbar {
  padding: 10px 16px;
  background: #13131f;
  border-bottom: 1px solid #2a2a3e;
  display: flex;
  align-items: center;
  gap: 12px;
}

.browser-url {
  flex: 1;
  padding: 8px 14px;
  background: #1e1e30;
  border: 1px solid #2a2a3e;
  border-radius: 8px;
  color: #888;
  font-size: 13px;
}

.browser-status {
  font-size: 11px;
  color: #666;
}

.browser-view {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.browser-view img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 4px;
}

.placeholder {
  text-align: center;
  color: #444;
}

.placeholder .icon {
  font-size: 64px;
  margin-bottom: 16px;
}

.placeholder p {
  font-size: 14px;
  color: #555;
}

/* 状态指示器 */
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.status-dot.idle { background: #444; }
.status-dot.running {
  background: #667eea;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* 连接状态 */
.connection-status {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
}

.connection-status.connected {
  background: #1a2e1e;
  color: #60c070;
}

.connection-status.disconnected {
  background: #2e1a1a;
  color: #c06060;
}
</style>
</head>
<body>

<div class="container">
  <!-- 左侧聊天 -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="logo">🤖</div>
      <div>
        <h1>QuoteBot Agent</h1>
        <div class="subtitle">智能名言探索代理 · Agentic Browser</div>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message assistant">
👋 你好！我是 QuoteBot，一个基于 LLM 的智能网页浏览代理。

我会自动浏览名言网站，帮你找到想要的名言。在右侧可以看到我的浏览过程。

试试下面的快捷指令，或者直接输入你的需求吧！
      </div>
    </div>

    <div class="chat-input-area">
      <div class="quick-commands">
        <button class="quick-btn" onclick="sendQuick('给我一个随机名言')">🎲 随机名言</button>
        <button class="quick-btn" onclick="sendQuick('找三条关于爱情的名言')">💕 爱情名言</button>
        <button class="quick-btn" onclick="sendQuick('爱因斯坦有哪些名言？')">🧑‍🔬 爱因斯坦</button>
        <button class="quick-btn" onclick="sendQuick('找关于励志的名言')">💪 励志名言</button>
        <button class="quick-btn" onclick="sendQuick('关于读书的名言')">📚 读书名言</button>
      </div>
      <div class="input-wrapper">
        <input type="text" class="chat-input" id="input"
               placeholder="输入指令，例如：找三条关于勇气的名言"
               onkeydown="if(event.key==='Enter')send()">
        <button class="btn-stop" id="btnStop" onclick="stop()" style="display:none">停止</button>
        <button class="btn-send" id="btnSend" onclick="send()">发送</button>
      </div>
    </div>
  </div>

  <!-- 右侧浏览器 -->
  <div class="browser-panel">
    <div class="browser-toolbar">
      <span class="status-dot idle" id="statusDot"></span>
      <div class="browser-url" id="browserUrl">等待开始...</div>
      <span class="connection-status disconnected" id="connStatus">未连接</span>
    </div>
    <div class="browser-view" id="browserView">
      <div class="placeholder">
        <div class="icon">🌐</div>
        <p>浏览器画面将在这里实时显示</p>
        <p style="margin-top:8px;font-size:12px;color:#444">发送指令后，Agent 会自动打开浏览器并展示执行过程</p>
      </div>
    </div>
  </div>
</div>

<script>
let ws = null;
let running = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('connStatus').textContent = '已连接';
    document.getElementById('connStatus').className = 'connection-status connected';
  };

  ws.onclose = () => {
    document.getElementById('connStatus').textContent = '已连接中…';
    document.getElementById('connStatus').className = 'connection-status disconnected';
    setTimeout(connect, 2000);
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleMessage(data);
  };
}

function handleMessage(data) {
  if (data.type === 'message') {
    addMessage(data.text, data.role);
  } else if (data.type === 'screenshot') {
    showScreenshot(data.image, data.url, data.step);
  }
}

function addMessage(text, role) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role || 'assistant'}`;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;

  // 如果是结果或成功消息，结束运行状态
  if (role === 'result' || role === 'success') {
    setRunning(false);
  }
}

function showScreenshot(imageBase64, url, step) {
  const view = document.getElementById('browserView');
  view.innerHTML = `<img src="data:image/png;base64,${imageBase64}" alt="${step}" />`;
  document.getElementById('browserUrl').textContent = url || '';
}

function setRunning(isRunning) {
  running = isRunning;
  document.getElementById('btnSend').disabled = isRunning;
  document.getElementById('btnStop').style.display = isRunning ? 'inline-block' : 'none';
  document.getElementById('statusDot').className = `status-dot ${isRunning ? 'running' : 'idle'}`;
}

function send() {
  if (running || !ws || ws.readyState !== WebSocket.OPEN) return;

  const input = document.getElementById('input');
  const instruction = input.value.trim();
  if (!instruction) return;

  addMessage(instruction, 'user');
  input.value = '';
  setRunning(true);

  ws.send(JSON.stringify({ type: 'start', instruction }));
}

function sendQuick(text) {
  if (running) return;
  document.getElementById('input').value = text;
  send();
}

function stop() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'stop' }));
  }
  setRunning(false);
}

connect();
</script>
</body>
</html>
